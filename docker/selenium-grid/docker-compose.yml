services:

  # ===== Selenium Hub =====
  selenium-hub:
    image: selenium/hub:4.18.1
    container_name: nexusqa-selenium-hub
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
    environment:
      - SE_SESSION_REQUEST_TIMEOUT=300
      - SE_SESSION_RETRY_INTERVAL=5
    networks:
      - nexusqa-grid

  # ===== Chrome Node 1 =====
  chrome-node-1:
    image: selenium/node-chrome:4.18.1
    container_name: nexusqa-chrome-1
    shm_size: '2gb'
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_VNC_NO_PASSWORD=1
    ports:
      - "7900:7900"
    networks:
      - nexusqa-grid

  # ===== Chrome Node 2 =====
  chrome-node-2:
    image: selenium/node-chrome:4.18.1
    container_name: nexusqa-chrome-2
    shm_size: '2gb'
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_VNC_NO_PASSWORD=1
    ports:
      - "7901:7900"
    networks:
      - nexusqa-grid

  # ===== Firefox Node =====
  firefox-node:
    image: selenium/node-firefox:4.18.1
    container_name: nexusqa-firefox
    shm_size: '2gb'
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_SESSION_TIMEOUT=300
    networks:
      - nexusqa-grid

  # ===== Selenium Grid UI =====
  selenium-grid-ui:
    image: selenium/hub:4.18.1
    container_name: nexusqa-grid-ui
    ports:
      - "4445:4444"
    networks:
      - nexusqa-grid

networks:
  nexusqa-grid:
    driver: bridge