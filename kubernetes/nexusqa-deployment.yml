apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusqa-framework
  namespace: nexusqa
  labels:
    app: nexusqa
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexusqa
  template:
    metadata:
      labels:
        app: nexusqa
    spec:
      containers:
        - name: nexusqa
          image: nexusqa:1.0
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          env:
            - name: BROWSER
              value: "chrome"
            - name: GRID_ENABLED
              value: "true"
            - name: GRID_URL
              value: "http://selenium-hub:4444/wd/hub"
          volumeMounts:
            - name: reports
              mountPath: /app/reports
      volumes:
        - name: reports
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: selenium-hub
  namespace: nexusqa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selenium-hub
  template:
    metadata:
      labels:
        app: selenium-hub
    spec:
      containers:
        - name: selenium-hub
          image: selenium/hub:4.18.1
          ports:
            - containerPort: 4444
            - containerPort: 4442
            - containerPort: 4443
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: selenium-chrome
  namespace: nexusqa
spec:
  replicas: 3
  selector:
    matchLabels:
      app: selenium-chrome
  template:
    metadata:
      labels:
        app: selenium-chrome
    spec:
      containers:
        - name: chrome
          image: selenium/node-chrome:4.18.1
          env:
            - name: SE_EVENT_BUS_HOST
              value: "selenium-hub"
            - name: SE_EVENT_BUS_PUBLISH_PORT
              value: "4442"
            - name: SE_EVENT_BUS_SUBSCRIBE_PORT
              value: "4443"
            - name: SE_NODE_MAX_SESSIONS
              value: "3"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - mountPath: /dev/shm
              name: dshm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi